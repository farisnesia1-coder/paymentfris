<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donate</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: rgba(255,255,255,0.05);
  padding: 25px;
  border-radius: 20px;
  text-align: center;
  width: 320px;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

.logo {
  width: 110px;
}

h2 {
  margin: 10px 0;
}

.dana-box {
  background: #111;
  padding: 12px;
  border-radius: 12px;
  margin: 12px 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.dana-number {
  font-weight: bold;
  cursor: pointer;
}

.copy-btn, .action-btn {
  background: #00c853;
  border: none;
  color: white;
  padding: 6px 12px;
  border-radius: 8px;
  cursor: pointer;
  margin: 5px;
}

.copy-btn:hover, .action-btn:hover {
  background: #00e676;
}

.an {
  font-size: 16px;
  font-weight: bold;
}

.qr {
  width: 170px;
  margin-top: 15px;
  border-radius: 10px;
}

/* POPUP */
.popup {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  justify-content: center;
  align-items: center;
  animation: fadeIn 0.3s;
}

.popup img {
  width: 200px;
  border-radius: 15px;
  transform: scale(0.5);
  animation: zoomIn 0.3s forwards;
}

/* ANIMASI */
@keyframes zoomIn {
  to {
    transform: scale(1);
  }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
</style>

</head>
<body>

<div class="container">
  <img src="https://files.catbox.moe/rny0vb.jpg" class="logo">

  <h2>Donate Kesini Aja Orang Baik</h2>

  <div class="dana-box">
    <span class="dana-number" id="dana" onclick="copyDana()">089654031159</span>
    <button class="copy-btn" onclick="copyDana()">Copy</button>
  </div>

  <div class="an">A/N: MINXXXXXX</div>

  <img src="https://files.catbox.moe/fmk4wg.png" class="qr" id="qrImage">

  <div>
    <button class="action-btn" onclick="downloadQR()">Download QR</button>
    <button class="action-btn" onclick="zoomQR()">Zoom QR</button>
  </div>
</div>

<!-- POPUP -->
<div class="popup" id="popup" onclick="closeZoom()">
  <img id="zoomImg">
</div>

<script>
function copyDana() {
  var text = document.getElementById("dana").innerText;

  var textarea = document.createElement("textarea");
  textarea.value = text;
  document.body.appendChild(textarea);
  textarea.select();
  document.execCommand("copy");
  document.body.removeChild(textarea);

  alert("Nomor berhasil disalin: " + text);
}

// FIX DOWNLOAD (ANTI GAGAL)
async function downloadQR() {
  const url = document.getElementById("qrImage").src;

  const response = await fetch(url);
  const blob = await response.blob();

  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "QR-DANA.png";
  link.click();
}

// ZOOM
function zoomQR() {
  const img = document.getElementById("qrImage").src;
  const zoomImg = document.getElementById("zoomImg");

  zoomImg.src = img;
  document.getElementById("popup").style.display = "flex";
}

// CLOSE
function closeZoom() {
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
